<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Markdown Notes</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.css">

<style>

body{
margin:0;
font-family:sans-serif;
}

.app{
display:flex;
height:100vh;
}

/* LEFT SIDEBAR */

.left-sidebar{
width:160px;
display:flex;
flex-direction:column;
border-right:1px solid #ddd;
font-size:13px;
}

.pages-list{
flex:1;
overflow-y:auto;
}

.page-item{
padding:6px 8px;
cursor:pointer;
}

.page-item:hover{
background:#f2f2f2;
}

.sidebar-buttons{
display:flex;
flex-direction:column;
gap:4px;
padding:6px;
}

.sidebar-buttons button{
font-size:12px;
padding:6px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.sidebar-buttons button:hover{
background:#f5f5f5;
}

/* MAIN EDITOR */

.main-editor{
flex:1;
}

/* RIGHT SIDEBAR */

.right-sidebar{
width:160px;
display:flex;
flex-direction:column;
border-left:1px solid #ddd;
}

.sidebar-header{
display:flex;
gap:6px;
padding:6px;
border-bottom:1px solid #eee;
}

.sidebar-header button{
font-size:12px;
padding:4px 6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="app">

<!-- LEFT SIDEBAR -->

<aside class="left-sidebar">

<div class="pages-list" id="pages">
<div class="page-item">Page 1</div>
<div class="page-item">Page 2</div>
<div class="page-item">Page 3</div>
</div>

<div class="sidebar-buttons">
<button onclick="addPage()">+ New Page</button>
<button onclick="exportData()">Export</button>
<button onclick="triggerImport()">Import</button>
<input type="file" id="importFile" style="display:none" onchange="importData(event)">
</div>

</aside>

<!-- MAIN EDITOR -->

<main class="main-editor">
<textarea id="main-editor"></textarea>
</main>

<!-- RIGHT SIDEBAR -->

<aside class="right-sidebar">

<div class="sidebar-header">
<button onclick="toggleEdit()">edit</button>
<button onclick="togglePreview()">preview</button>
<button onclick="toggleSidebar()">hide</button>
</div>

<textarea id="todo-editor"></textarea>

</aside>

</div>

<script src="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.js"></script>

<script>

/* MAIN EDITOR */

const mainEditor = new SimpleMDE({
element: document.getElementById("main-editor"),
spellChecker:false
})

/* TODO EDITOR */

const todoEditor = new SimpleMDE({
element: document.getElementById("todo-editor"),
toolbar:false,
status:false,
spellChecker:false
})

/* AUTOSAVE */

if(localStorage.getItem("mainMarkdown")){
mainEditor.value(localStorage.getItem("mainMarkdown"))
}

if(localStorage.getItem("todoMarkdown")){
todoEditor.value(localStorage.getItem("todoMarkdown"))
}

setInterval(()=>{

localStorage.setItem("mainMarkdown", mainEditor.value())
localStorage.setItem("todoMarkdown", todoEditor.value())

},1000)

/* NEW PAGE */

function addPage(){

const pages=document.getElementById("pages")

const div=document.createElement("div")
div.className="page-item"
div.textContent="New Page"

pages.appendChild(div)

}

/* EXPORT */

function exportData(){

const data={
main:mainEditor.value(),
todo:todoEditor.value()
}

const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"})
const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="markdown_notes_backup.json"
a.click()

}

/* IMPORT */

function triggerImport(){
document.getElementById("importFile").click()
}

function importData(event){

const file=event.target.files[0]
if(!file)return

const reader=new FileReader()

reader.onload=function(e){

const data=JSON.parse(e.target.result)

if(data.main){
mainEditor.value(data.main)
}

if(data.todo){
todoEditor.value(data.todo)
}

}

reader.readAsText(file)

}

/* SIDEBAR BUTTONS */

function toggleEdit(){
todoEditor.togglePreview()
}

function togglePreview(){
todoEditor.togglePreview()
}

function toggleSidebar(){

const sidebar=document.querySelector(".right-sidebar")

if(sidebar.style.display==="none"){
sidebar.style.display="flex"
}else{
sidebar.style.display="none"
}

}

</script>

</body>
</html>
