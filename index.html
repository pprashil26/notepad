<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Markdown Notes</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.css">

<style>

body{
margin:0;
font-family:sans-serif;
}

.container{
display:flex;
height:100vh;
}

/* LEFT SIDEBAR */

.left-sidebar{
width:150px;
border-right:1px solid #ddd;
display:flex;
flex-direction:column;
font-size:13px;
}

.pages{
flex:1;
overflow:auto;
}

.page{
padding:6px;
cursor:pointer;
}

.page:hover{
background:#f2f2f2;
}

.left-bottom{
padding:6px;
display:flex;
flex-direction:column;
gap:4px;
}

.left-bottom button{
font-size:12px;
padding:5px;
cursor:pointer;
}

/* MAIN EDITOR */

.main{
flex:1;
}

/* RIGHT SIDEBAR */

.right-sidebar{
width:150px;
border-left:1px solid #ddd;
display:flex;
flex-direction:column;
}

.right-top{
display:flex;
gap:4px;
padding:5px;
border-bottom:1px solid #eee;
}

.right-top button{
font-size:11px;
padding:4px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT SIDEBAR -->

<div class="left-sidebar">

<div class="pages" id="pages">
<div class="page">Page 1</div>
<div class="page">Page 2</div>
</div>

<div class="left-bottom">

<button onclick="newPage()">+ New Page</button>
<button onclick="exportData()">Export</button>
<button onclick="openImport()">Import</button>

<input type="file" id="importFile" style="display:none" onchange="importData(event)">

</div>

</div>


<!-- MAIN EDITOR -->

<div class="main">
<textarea id="editor"></textarea>
</div>


<!-- RIGHT SIDEBAR -->

<div class="right-sidebar">

<div class="right-top">
<button onclick="editTodo()">edit</button>
<button onclick="previewTodo()">preview</button>
<button onclick="toggleRight()">hide</button>
</div>

<textarea id="todo"></textarea>

</div>

</div>

<script src="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.js"></script>

<script>

/* MAIN MARKDOWN EDITOR */

const editor = new SimpleMDE({
element: document.getElementById("editor"),
spellChecker:false
})

/* TODO MARKDOWN */

const todo = new SimpleMDE({
element: document.getElementById("todo"),
toolbar:false,
status:false,
spellChecker:false
})

/* AUTOSAVE */

if(localStorage.main){
editor.value(localStorage.main)
}

if(localStorage.todo){
todo.value(localStorage.todo)
}

setInterval(()=>{

localStorage.main = editor.value()
localStorage.todo = todo.value()

},1000)

/* NEW PAGE */

function newPage(){

const div=document.createElement("div")
div.className="page"
div.textContent="New Page"

document.getElementById("pages").appendChild(div)

}

/* EXPORT */

function exportData(){

const data={
main:editor.value(),
todo:todo.value()
}

const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"})
const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="notes_backup.json"
a.click()

}

/* IMPORT */

function openImport(){
document.getElementById("importFile").click()
}

function importData(e){

const file=e.target.files[0]
if(!file)return

const reader=new FileReader()

reader.onload=function(event){

const data=JSON.parse(event.target.result)

if(data.main) editor.value(data.main)
if(data.todo) todo.value(data.todo)

}

reader.readAsText(file)

}

/* RIGHT SIDEBAR BUTTONS */

function editTodo(){
todo.togglePreview()
}

function previewTodo(){
todo.togglePreview()
}

function toggleRight(){

const r=document.querySelector(".right-sidebar")

if(r.style.display==="none"){
r.style.display="flex"
}else{
r.style.display="none"
}

}

</script>

</body>
</html>
