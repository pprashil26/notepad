<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notepad v2.0</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ... (Keep all your existing styles above unchanged) ... */

/* TAG PANEL */
#tagPanel{
  padding:6px;
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  border-top:1px solid #eee;
  background:#fafafa;
}
.tagItem{
  background:#e0f0ff;
  color:#0077cc;
  padding:2px 6px;
  border-radius:4px;
  cursor:pointer;
  font-size:11px;
}
.tagItem:hover{background:#c8e0ff;}
#tagSuggest{
  position:absolute;
  background:white;
  border:1px solid #ddd;
  border-radius:6px;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
  display:none;
  max-height:160px;
  overflow:auto;
  font-size:12px;
  z-index:999;
}
.tagSuggestItem{
  padding:6px 8px;
  cursor:pointer;
}
.tagSuggestItem:hover{
  background:#f0f4ff;
}
</style>
</head>
<body>

<div id="topbar">
<input id="search" placeholder="Search notes (Ctrl + /)">
<button class="topbtn" onclick="exportNotes()">Export</button>
<button class="topbtn" onclick="document.getElementById('importFile').click()">Import</button>
<input type="file" id="importFile" style="display:none">
</div>

<div id="container">
  <div id="sidebar">
    <div id="pages"></div>
    <div id="tagPanel"></div> <!-- TAG PANEL -->
    <button id="newPage">+ New Page</button>
  </div>

  <div id="editorCard">
    <div id="mode">
      <button onclick="setMode('edit')">Edit</button>
      <button onclick="setMode('preview')">Preview</button>
      <button onclick="togglePin()">Pin</button>
      <button id="deleteBtn" onclick="deleteNote()">Delete</button>
    </div>
    <input id="title" placeholder="Title">
    <textarea id="content"></textarea>
    <div id="preview"></div>
    <div id="tags"></div>
    <div id="stats"></div>
    <div id="backlinks"></div>
  </div>

  <div id="todoSidebar">
    <div id="todoHeader">
      <span>Todo</span>
      <div id="todoButtons">
        <button class="todoBtn" onclick="setTodoMode('edit')">Edit</button>
        <button class="todoBtn" onclick="setTodoMode('preview')">Preview</button>
        <button class="todoBtn" onclick="toggleTodo()">⇄</button>
      </div>
    </div>
    <div id="stickyNote" contenteditable="true" placeholder="Sticky Note..." spellcheck="false">Write sticky note here...</div>
    <textarea id="todoContent" placeholder="Write your global todos here..."></textarea>
    <div id="todoPreview"></div>
  </div>
</div>

<button id="showTodoBtn" onclick="toggleTodo()">Show Todo</button>

<div id="palette">
<input id="paletteSearch" placeholder="Jump to note...">
<div id="paletteList"></div>
</div>
<div id="linkSuggest"></div>
<div id="hoverPreview"></div>
<div id="tagSuggest"></div> <!-- TAG SUGGEST -->

<script>
// --- NOTES ---
let notes = JSON.parse(localStorage.getItem("markdownNotes") || "[]")
let current = null
let mode="preview"
let tagFilter = null

// --- TODO ---
let todoVisible = true
let todoMode = "edit"

// SAVE NOTES
function save(){localStorage.setItem("markdownNotes",JSON.stringify(notes))}
function saveTodo(){localStorage.setItem("globalTodo",todoContent.value)}

// --- TAGS & LINKS ---
function getTags(text){let m=text.match(/#\w+/g);return m?[...new Set(m.map(t=>t.toLowerCase()))]:[]}
function getLinks(text){let m=text.match(/\[\[(.*?)\]\]/g);return m?m.map(v=>v.replace("[[","").replace("]]","")):[]}

// --- RENDER TAG PANEL ---
function renderTagPanel(){
  let uniqueTags = [...new Set(notes.flatMap(n=>n.tags || []))].sort()
  tagPanel.innerHTML = ""
  uniqueTags.forEach(tag=>{
    let span = document.createElement("span")
    span.className="tagItem"
    span.textContent=tag
    span.onclick=()=>{tagFilter=tag;renderPages(search.value.toLowerCase())}
    tagPanel.appendChild(span)
  })
}

// --- SIDEBAR RENDER ---
function renderPages(filter=""){
    let pinned=[],others=[]
    notes.forEach(n=>{
        if(filter && !n.title.toLowerCase().includes(filter) && !n.content.toLowerCase().includes(filter)) return
        if(tagFilter && (!n.tags || !n.tags.includes(tagFilter))) return
        if(n.pinned) pinned.push(n)
        else others.push(n)
    })
    pinned.sort((a,b)=>b.created-a.created)
    others.sort((a,b)=>b.created-a.created)
    pages.innerHTML=""
    function renderList(list){
        list.forEach(n=>{
            let div=document.createElement("div")
            div.className="page"+(n.id===current?" active":"")
            let t=document.createElement("span");t.textContent=n.title
            let date=document.createElement("span")
            let d=new Date(n.created)
            date.textContent=`${d.getDate()}/${d.getMonth()+1}`
            date.className="dateLabel"
            let p=document.createElement("span");p.className="pin";p.textContent=n.pinned?"📌":"" 
            div.appendChild(t);div.appendChild(date);div.appendChild(p)
            div.onclick=()=>openNote(n.id)
            pages.appendChild(div)
        })
    }
    renderList(pinned)
    renderList(others)
    renderTagPanel()
}

// --- NEW NOTE ---
newPage.onclick=()=>{
    let id=Date.now()
    let note={id:id,title:"Untitled Note",content:"",tags:[],created:id,updated:id,pinned:false}
    notes.unshift(note)
    save()
    openNote(id)
}

// --- META PANELS ---
function renderMeta(note){
    note.tags = getTags(note.content)
    tags.innerHTML = "Tags: " + note.tags.map(t=>`<span class='tagItem' onclick="tagFilter='${t}';renderPages(search.value.toLowerCase())">${t}</span>`).join(" ")
    let links=getLinks(note.content)
    let words=note.content.split(/\s+/).filter(Boolean).length
    let chars=note.content.length
    stats.innerText="Words: "+words+" | Chars: "+chars+" | Links: "+links.length+" | Updated: "+new Date(note.updated).toLocaleString()
    let refs=[]
    notes.forEach(n=>{
        if(n.id!==note.id && getLinks(n.content).includes(note.title)){
            refs.push(n)
        }
    })
    if(refs.length===0){
        backlinks.innerHTML="Backlinks: None"
        return
    }
    backlinks.innerHTML="Backlinks: "
    refs.forEach((n,i)=>{
        let a=document.createElement("a")
        a.href="#"
        a.textContent=n.title
        a.style.marginRight="6px"
        a.onclick=(e)=>{
            e.preventDefault()
            openNote(n.id)
        }
        backlinks.appendChild(a)
    })
}

// --- TITLE & CONTENT ---
title.oninput=e=>{
  let n=notes.find(x=>x.id===current)
  n.title=e.target.value
  n.updated=Date.now()
  save()
  renderPages()
}
content.oninput=e=>{
  let n=notes.find(x=>x.id===current)
  n.content=e.target.value
  n.updated=Date.now()
  n.tags = getTags(n.content)
  save()
  renderMeta(n)
  if(mode==="preview") renderPreview()
}

// --- PIN / DELETE ---
function togglePin(){let n=notes.find(x=>x.id===current);n.pinned=!n.pinned;save();renderPages()}
function deleteNote(){if(!confirm("Delete note?")) return;notes=notes.filter(n=>n.id!==current);save();if(notes.length) openNote(notes[0].id);renderPages()}

// --- MARKDOWN ---
function renderPreview(){
  let html = marked.parse(content.value)
  html = html.replace(/\[\[(.*?)\]\]/g,function(_,name){
    let note = notes.find(n=>n.title.toLowerCase() === name.toLowerCase())
    if(!note){
      let id = Date.now()
      note = {id:id,title:name,content:"",tags:[],created:id,updated:id,pinned:false}
      notes.push(note)
      save()
    }
    return "<a href='#' class='noteLink' data-id='"+note.id+"' onclick=\"openNote("+note.id+")\">"+name+"</a>"
  })
  preview.innerHTML = html
}

// --- MODE ---
function setMode(m){
  mode = m
  if(m === "edit"){
    content.style.display = "block";
    preview.style.display = "none";
    editorCard.classList.add("editMode");
    editorCard.classList.remove("previewMode");
  } else {
    renderPreview();
    content.style.display = "none";
    preview.style.display = "block";
    editorCard.classList.add("previewMode");
    editorCard.classList.remove("editMode");
  }
}

// --- TAG SUGGESTIONS ---
const tagSuggest = document.getElementById("tagSuggest")
content.addEventListener("keyup", function(e){
  let pos = content.selectionStart
  let text = content.value.substring(0,pos)
  let match = text.match(/#(\w*)$/)
  if(match){
    let query = match[1].toLowerCase()
    let allTags = [...new Set(notes.flatMap(n=>n.tags || []))]
    let results = allTags.filter(t=>t.includes(query))
    if(results.length===0){tagSuggest.style.display="none"; return}
    tagSuggest.innerHTML=""
    results.slice(0,8).forEach(t=>{
      let div = document.createElement("div")
      div.className="tagSuggestItem"
      div.textContent=t
      div.onclick=()=>{
        let start = text.lastIndexOf("#")
        let before = content.value.substring(0,start)
        let after = content.value.substring(pos)
        content.value = before + t + after
        tagSuggest.style.display="none"
        content.focus()
        content.oninput() // trigger meta update
      }
      tagSuggest.appendChild(div)
    })
    let rect = content.getBoundingClientRect()
    let lineHeight = 18
    let lines = content.value.substr(0,pos).split("\n").length
    tagSuggest.style.left = rect.left + 10 + "px"
    tagSuggest.style.top = rect.top + (lines*lineHeight) + 20 + "px"
    tagSuggest.style.display="block"
  } else {
    tagSuggest.style.display="none"
  }
})

// --- OPEN NOTE ---
function openNote(id){
    current=id
    let note=notes.find(n=>n.id===id)
    title.value=note.title
    content.value=note.content
    renderMeta(note)
    setMode("preview")  
    renderPages()
}

// --- INIT ---
if(notes.length===0){
  let id=Date.now()
  notes.push({id:id,title:"Welcome",content:"# Welcome\n\nUse [[Example Note]] to create linked notes.\n\n#demo",tags:getTags("# Welcome\n\nUse [[Example Note]]\n#demo"),created:id,updated:id,pinned:false})
  save()
}
openNote(notes[0].id)
todoContent.value = localStorage.getItem("globalTodo") || ""
setTodoMode("preview")
stickyNote.innerText = localStorage.getItem("stickyNote") || ""
stickyNote.oninput = ()=>{localStorage.setItem("stickyNote", stickyNote.innerText)}
document.addEventListener("keydown", e => {if(e.ctrlKey && e.key==="/"){e.preventDefault(); search.focus()}})
search.oninput=e=>{renderPages(e.target.value.toLowerCase())}
</script>
</body>
</html>
